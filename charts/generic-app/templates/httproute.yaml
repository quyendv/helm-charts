{{- if .Values.gatewayApi.enabled }}
{{- if not .Values.gatewayApi.httpRoute.parentRefs }}
{{- fail "gatewayApi.httpRoute.parentRefs is required when gatewayApi.enabled is true" }}
{{- end }}
{{- if not .Values.service.enabled }}
{{- fail "service.enabled must be true when gatewayApi.enabled is true (HTTPRoute targets the chart Service)" }}
{{- end }}
apiVersion: {{ include "generic-app.gatewayApi.httpRoute.apiVersion" . }}
kind: HTTPRoute
metadata:
  name: {{ include "generic-app.gatewayApi.httpRoute.resourceName" . | quote }}
  namespace: {{ include "generic-app.namespace" . | quote }}
  labels:
    {{- include "generic-app.labels" . | nindent 4 }}
    {{- with .Values.gatewayApi.httpRoute.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if or .Values.gatewayApi.httpRoute.annotations .Values.commonAnnotations }}
  annotations:
    {{- if .Values.gatewayApi.httpRoute.annotations }}
    {{- include "generic-app.tplvalues.render" ( dict "value" .Values.gatewayApi.httpRoute.annotations "context" $) | nindent 4 }}
    {{- end }}
    {{- if .Values.commonAnnotations }}
    {{- include "generic-app.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  parentRefs:
{{- toYaml .Values.gatewayApi.httpRoute.parentRefs | nindent 4 }}
  {{- $hn := .Values.gatewayApi.httpRoute.hostnames | default list }}
  {{- if .Values.gatewayApi.hostname }}
  {{- $hn = concat $hn (list .Values.gatewayApi.hostname) }}
  {{- end }}
  {{- $hn = compact $hn | uniq }}
  {{- if $hn }}
  hostnames:
    {{- range $hn }}
    - {{ . | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- if .Values.gatewayApi.httpRoute.rules }}
    {{- include "generic-app.tplvalues.render" (dict "value" .Values.gatewayApi.httpRoute.rules "context" $) | nindent 4 }}
    {{- else }}
    - matches:
        - path:
            type: {{ .Values.gatewayApi.httpRoute.path.type }}
            value: {{ .Values.gatewayApi.httpRoute.path.value | quote }}
      {{- if (include "generic-app.gatewayApi.nginxGatewayFabric.injectSnippetExtensionRef" .) }}
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.nginx.org
            kind: SnippetsFilter
            name: {{ include "generic-app.gatewayApi.nginxGatewayFabric.snippetsFilterName" . | quote }}
      {{- end }}
      backendRefs:
        - name: {{ include "generic-app.fullname" . }}
          port: {{ index .Values.service.ports "http" }}
    {{- end }}
    {{- if .Values.gatewayApi.httpRoute.extraRules }}
    {{- tpl .Values.gatewayApi.httpRoute.extraRules . | nindent 4 }}
    {{- end }}
{{- end }}
