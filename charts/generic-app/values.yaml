## @param updateStrategy.type statefulset/deployment strategy type
## @param updateStrategy.rollingUpdate.maxSurge Maximum number of pods that can be created over desired replicas (Deployment only)
## @param updateStrategy.rollingUpdate.maxUnavailable Maximum number of pods that can be unavailable during update
## @param updateStrategy.rollingUpdate.partition Ordinal at which StatefulSet should be partitioned (StatefulSet only)
## ref: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#update-strategies
## ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
##
