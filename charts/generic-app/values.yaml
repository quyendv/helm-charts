  ## Can be set to RollingUpdate or OnDelete (for StatefulSet)
  ## Can be set to RollingUpdate or Recreate (for Deployment)
  ##
  type: RollingUpdate
  ## Rolling update configuration parameters
  ## Only applies when type is RollingUpdate
  ##
  # rollingUpdate:
  #   ## For Deployment: Maximum number of pods that can be created over the desired number
  #   ## Can be an absolute number (e.g., 5) or a percentage of desired pods (e.g., 10%)
  #   ## Default is 25%
  #   maxSurge: 1
  #   ## For Deployment and StatefulSet: Maximum number of pods that can be unavailable during update
  #   ## Can be an absolute number (e.g., 5) or a percentage of desired pods (e.g., 10%)
  #   ## Default is 25% for Deployment, 1 for StatefulSet
  #   maxUnavailable: 0
  #   ## For StatefulSet only: Ordinal at which the StatefulSet should be partitioned
  #   ## Default is 0, which means all pods will be updated
  #   # partition: 0

