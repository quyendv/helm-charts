# Default values for generic-app
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

## @section Global parameters
## Global Docker image parameters
## Please, note that this will override the image parameters, including dependencies, configured to use the global value
## Current available global Docker image parameters: imageRegistry, imagePullSecrets and storageClass

## @param global.imageRegistry Global Docker image registry
## @param global.imagePullSecrets Global Docker registry secret names as an array
## @param global.storageClass Global StorageClass for Persistent Volume(s)
##
global:
  imageRegistry: ""
  ## E.g.
  ## imagePullSecrets:
  ##   - myRegistryKeySecretName
  ##
  imagePullSecrets: []
  storageClass: ""

## @section Common parameters

## @param nameOverride String to partially override common.names.fullname
##
nameOverride: ""
## @param fullnameOverride String to fully override common.names.fullname
##
fullnameOverride: ""
## @param namespaceOverride String to fully override common.names.namespace
##
namespaceOverride: ""
## @param commonLabels Labels to add to all deployed objects
##
commonLabels: {}
## @param commonAnnotations Annotations to add to all deployed objects
##
commonAnnotations: {}

## @section Application parameters

## @param replicaCount Number of replicas to deploy
##
replicaCount: 1

## @param kind Workload kind (Deployment or StatefulSet)
##
kind: Deployment

## Application image configuration
## ref: https://hub.docker.com/
## @param image.registry Application image registry
## @param image.repository Application image repository
## @param image.tag Application image tag (immutable tags are recommended)
## @param image.pullPolicy Application image pull policy
## @param image.pullSecrets Application image pull secrets
##
image:
  registry: docker.io
  repository: nginx
  tag: "1.25.3"
  ## Specify a imagePullPolicy
  ## Defaults to 'Always' if image tag is 'latest', else set to 'IfNotPresent'
  ## ref: https://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
  ##
  pullPolicy: IfNotPresent
  ## Optionally specify an array of imagePullSecrets.
  ## Secrets must be manually created in the namespace.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  ## e.g:
  ## pullSecrets:
  ##   - myRegistryKeySecretName
  ##
  pullSecrets: []

## @param command Override default container command (useful when using custom images)
##
command: []
## @param args Override default container args (useful when using custom images)
##
args: []

## @param extraEnvVars Array with extra environment variables to add
## e.g:
## extraEnvVars:
##   - name: FOO
##     value: "bar"
##   - name: DATABASE_HOST
##     valueFrom:
##       configMapKeyRef:
##         name: app-config
##         key: db_host
##
extraEnvVars: []

## @param extraEnvVarsConfigMaps List of existing ConfigMaps to load as environment variables
## All keys from these ConfigMaps will be exposed as environment variables
## e.g:
## extraEnvVarsConfigMaps:
##   - app-config
##   - shared-config
##
extraEnvVarsConfigMaps: []

## @param extraEnvVarsSecrets List of existing Secrets to load as environment variables
## All keys from these Secrets will be exposed as environment variables
## e.g:
## extraEnvVarsSecrets:
##   - app-secret
##   - db-credentials
##
extraEnvVarsSecrets: []

## @section Security parameters

## Container Security Context
## Defines privilege and access control settings for containers
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
##
## @param containerSecurityContext.enabled Enable container security context
## @param containerSecurityContext.runAsUser User ID to run the container (non-root user)
## @param containerSecurityContext.runAsNonRoot Force container to run as non-root user
## @param containerSecurityContext.readOnlyRootFilesystem Mount root filesystem as read-only
## @param containerSecurityContext.allowPrivilegeEscalation Prevent privilege escalation
##
containerSecurityContext:
  enabled: false
  # runAsUser: 1001
  # runAsNonRoot: true
  # readOnlyRootFilesystem: false
  # allowPrivilegeEscalation: false
  # capabilities:
  #   drop:
  #     - ALL

## Pod Security Context
## Defines pod-level security settings (applies to all containers in pod)
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/security-context/
##
## @param podSecurityContext.enabled Enable pod security context
## @param podSecurityContext.fsGroup Group ID for filesystem ownership
##
podSecurityContext:
  enabled: false
  # runAsNonRoot: true
  # runAsUser: 1001
  # runAsGroup: 1001
  # fsGroup: 1001
  # seccompProfile:
  #   type: RuntimeDefault

## @section Service parameters

## Service configuration
##
service:
  ## @param service.enabled Enable service creation
  ##
  enabled: true
  ## @param service.type Service type
  ##
  type: ClusterIP
  ## @param service.ports Service ports
  ##
  ports:
    http: 80
  ## @param service.nodePorts Node ports to expose
  ## NOTE: choose port between <30000-32767>
  ##
  nodePorts:
    http: ""
  ## @param service.clusterIP Service Cluster IP
  ## e.g.:
  ## clusterIP: None
  ##
  clusterIP: ""
  ## @param service.loadBalancerIP Service Load Balancer IP
  ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#type-loadbalancer
  ##
  loadBalancerIP: ""
  ## @param service.loadBalancerSourceRanges Service Load Balancer sources
  ## ref: https://kubernetes.io/docs/tasks/access-application-cluster/configure-cloud-provider-firewall/#restrict-access-for-loadbalancer-service
  ## e.g:
  ## loadBalancerSourceRanges:
  ##   - 10.10.10.0/24
  ##
  loadBalancerSourceRanges: []
  ## @param service.externalTrafficPolicy Service external traffic policy
  ## ref https://kubernetes.io/docs/tasks/access-application-cluster/create-external-load-balancer/#preserving-the-client-source-ip
  ##
  externalTrafficPolicy: Cluster
  ## @param service.annotations Additional custom annotations for Service
  ##
  annotations: {}
  ## @param service.extraPorts Extra ports to expose in Service (normally used with the `sidecars` value)
  ##
  extraPorts: []
  ## @param service.sessionAffinity Session Affinity for Kubernetes service, can be "None" or "ClientIP"
  ## If "ClientIP", consecutive client requests will be directed to the same Pod
  ## ref: https://kubernetes.io/docs/concepts/services-networking/service/#virtual-ips-and-service-proxies
  ##
  sessionAffinity: None
  ## @param service.sessionAffinityConfig Additional settings for the sessionAffinity
  ## sessionAffinityConfig:
  ##   clientIP:
  ##     timeoutSeconds: 300
  ##
  sessionAffinityConfig: {}

## @section Cert-Manager parameters

## Cert-Manager Issuer configuration
## ref: https://cert-manager.io/docs/configuration/
##
certManager:
  ## @param certManager.enabled Enable cert-manager issuer creation
  ##
  enabled: false
  ## @param certManager.issuerType Type of issuer to create (Issuer or ClusterIssuer)
  ##
  issuerType: ClusterIssuer
  ## @param certManager.issuerName Name of the issuer (if empty, will use release name)
  ##
  issuerName: ""
  ## ACME configuration for Let's Encrypt
  ##
  acme:
    ## @param certManager.acme.enabled Enable ACME issuer (Let's Encrypt)
    ##
    enabled: true
    ## @param certManager.acme.server ACME server URL
    ## Production: https://acme-v02.api.letsencrypt.org/directory
    ## Staging: https://acme-staging-v02.api.letsencrypt.org/directory
    ##
    server: https://acme-v02.api.letsencrypt.org/directory
    ## @param certManager.acme.email Email address for ACME registration
    ##
    email: ""
    ## @param certManager.acme.privateKeySecretRef Secret name to store ACME account private key
    ##
    privateKeySecretRef: ""
    ## ACME challenge solvers
    ##
    solvers:
      ## @param certManager.acme.solvers HTTP01 solver configuration
      ## e.g:
      ## - http01:
      ##     ingress:
      ##       class: nginx
      ##
      - http01:
          ingress:
            class: nginx
  ## CA Issuer configuration
  ##
  ca:
    ## @param certManager.ca.enabled Enable CA issuer
    ##
    enabled: false
    ## @param certManager.ca.secretName Secret name containing CA certificate and key
    ##
    secretName: ""
  ## Vault Issuer configuration
  ##
  vault:
    ## @param certManager.vault.enabled Enable Vault issuer
    ##
    enabled: false
    ## @param certManager.vault.server Vault server URL
    ##
    server: ""
    ## @param certManager.vault.path Vault PKI path
    ##
    path: ""
    ## @param certManager.vault.caBundle CA bundle for Vault server
    ##
    caBundle: ""
    ## Vault authentication
    ##
    auth:
      ## @param certManager.vault.auth.tokenSecretRef Token secret reference
      ##
      tokenSecretRef:
        name: ""
        key: token

## @section Ingress parameters

## Ingress configuration
##
ingress:
  ## @param ingress.enabled Enable ingress record generation
  ##
  enabled: false
  ## @param ingress.ingressClassName IngressClass that will be be used to implement the Ingress (Kubernetes 1.18+)
  ## This is supported in Kubernetes 1.18+ and required if you have more than one IngressClass marked as the default for your cluster.
  ## ref: https://kubernetes.io/blog/2020/04/02/improvements-to-the-ingress-api-in-kubernetes-1.18/
  ##
  ingressClassName: ""
  ## @param ingress.pathType Ingress path type
  ##
  pathType: ImplementationSpecific
  ## @param ingress.apiVersion Force Ingress API version (automatically detected if not set)
  ##
  apiVersion: ""
  ## @param ingress.hostname Default host for the ingress record
  ##
  hostname: app.local
  ## @param ingress.path Default path for the ingress record
  ## NOTE: You may need to set this to '/*' in order to use this with ALB ingress controllers
  ##
  path: /
  ## @param ingress.annotations Additional annotations for the Ingress resource. To enable certificate autogeneration, place here your cert-manager annotations.
  ## Use this parameter to set the required annotations for cert-manager, see
  ## ref: https://cert-manager.io/docs/usage/ingress/#supported-annotations
  ## e.g:
  ## annotations:
  ##   kubernetes.io/ingress.class: nginx
  ##   cert-manager.io/cluster-issuer: cluster-issuer-name
  ##
  annotations: {}
  ## @param ingress.tls Enable TLS configuration for the host defined at `ingress.hostname` parameter
  ## TLS certificates will be retrieved from a TLS secret with name: `{{- printf "%s-tls" .Values.ingress.hostname }}`
  ## You can:
  ##   - Create the TLS secret manually before deploying
  ##   - Rely on cert-manager to create it by setting the corresponding annotations
  ##
  tls: false
  ## @param ingress.extraHosts An array with additional hostname(s) to be covered with the ingress record
  ## e.g:
  ## extraHosts:
  ##   - name: app.local
  ##     path: /
  ##
  extraHosts: []
  ## @param ingress.extraPaths An array with additional arbitrary paths that may need to be added to the ingress under the main host
  ## e.g:
  ## extraPaths:
  ## - path: /*
  ##   backend:
  ##     serviceName: ssl-redirect
  ##     servicePort: use-annotation
  ##
  extraPaths: []
  ## @param ingress.extraTls TLS configuration for additional hostname(s) to be covered with this ingress record
  ## ref: https://kubernetes.io/docs/concepts/services-networking/ingress/#tls
  ## e.g:
  ## extraTls:
  ## - hosts:
  ##     - app.local
  ##   secretName: app.local-tls
  ##
  extraTls: []
  ## @param ingress.extraRules Additional rules to be covered with this ingress record
  ## ref: https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-rules
  ## e.g:
  ## extraRules:
  ## - host: example.local
  ##     http:
  ##       path: /
  ##       backend:
  ##         service:
  ##           name: example-svc
  ##           port:
  ##             name: http
  ##
  extraRules: []

## @section Resources parameters

## Resource requests and limits
## ref: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
## @param resources.limits The resources limits for the containers
## @param resources.requests The requested resources for the containers
##
resources:
  limits: {}
  requests: {}

## Configure Pods' liveness, readiness and startup probes
## ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/#configure-probes
## @param livenessProbe.enabled Enable livenessProbe on containers
## @param livenessProbe.initialDelaySeconds Initial delay seconds for livenessProbe
## @param livenessProbe.periodSeconds Period seconds for livenessProbe
## @param livenessProbe.timeoutSeconds Timeout seconds for livenessProbe
## @param livenessProbe.failureThreshold Failure threshold for livenessProbe
## @param livenessProbe.successThreshold Success threshold for livenessProbe
##
livenessProbe:
  enabled: false
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

## @param readinessProbe.enabled Enable readinessProbe on containers
## @param readinessProbe.initialDelaySeconds Initial delay seconds for readinessProbe
## @param readinessProbe.periodSeconds Period seconds for readinessProbe
## @param readinessProbe.timeoutSeconds Timeout seconds for readinessProbe
## @param readinessProbe.failureThreshold Failure threshold for readinessProbe
## @param readinessProbe.successThreshold Success threshold for readinessProbe
##
readinessProbe:
  enabled: false
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

## @param startupProbe.enabled Enable startupProbe on containers
## @param startupProbe.initialDelaySeconds Initial delay seconds for startupProbe
## @param startupProbe.periodSeconds Period seconds for startupProbe
## @param startupProbe.timeoutSeconds Timeout seconds for startupProbe
## @param startupProbe.failureThreshold Failure threshold for startupProbe
## @param startupProbe.successThreshold Success threshold for startupProbe
##
startupProbe:
  enabled: false
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 0
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30
  successThreshold: 1

## @param customLivenessProbe Custom livenessProbe that overrides the default one
##
customLivenessProbe: {}
## @param customReadinessProbe Custom readinessProbe that overrides the default one
##
customReadinessProbe: {}
## @param customStartupProbe Custom startupProbe that overrides the default one
##
customStartupProbe: {}

## @param lifecycleHooks for the container(s) to automate configuration before or after startup
##
lifecycleHooks: {}

## @section Persistence parameters

## Persistence configuration
##
persistence:
  ## @param persistence.enabled Enable persistence using Persistent Volume Claims
  ##
  enabled: false
  ## @param persistence.storageClass Storage class of backing PVC
  ## If defined, storageClassName: <storageClass>
  ## If set to "-", storageClassName: "", which disables dynamic provisioning
  ## If undefined (the default) or set to null, no storageClassName spec is
  ##   set, choosing the default provisioner.  (gp2 on AWS, standard on
  ##   GKE, AWS & OpenStack)
  ##
  storageClass: ""
  ## @param persistence.annotations Persistent Volume Claim annotations
  ##
  annotations: {}
  ## @param persistence.accessModes Persistent Volume Access Modes
  ##
  accessModes:
    - ReadWriteOnce
  ## @param persistence.size Size of data volume
  ##
  size: 8Gi
  ## @param persistence.existingClaim The name of an existing PVC to use for persistence
  ##
  existingClaim: ""
  ## @param persistence.selector Selector to match an existing Persistent Volume for PVC
  ## If set, the PVC can't have a PV dynamically provisioned for it
  ## E.g.
  ## selector:
  ##   matchLabels:
  ##     app: my-app
  ##
  selector: {}
  ## @param persistence.dataSource Custom PVC data source
  ##
  dataSource: {}
  ## @param persistence.mountPath The path the volume will be mounted at
  ##
  mountPath: /data
  ## @param persistence.subPath The subdirectory of the volume to mount to
  ## Useful in dev environments and one PV for multiple services
  ##
  subPath: ""

