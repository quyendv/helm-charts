##     imagePullPolicy: Always
##     ports:
##       - name: portname
##         containerPort: 1234
##
sidecars: []

## @param extraVolumes Optionally specify extra list of additional volumes for the pods
##
extraVolumes: []

## @param extraVolumeMounts Optionally specify extra list of additional volumeMounts for the container(s)
##
extraVolumeMounts: []

