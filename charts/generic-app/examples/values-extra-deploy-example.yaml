# ============================================================================
# Extra Deploy Examples
# ============================================================================
# This file demonstrates how to use the extraDeploy feature to deploy
# additional Kubernetes resources alongside your application.
# All objects support full Helm templating with access to chart values and helpers.

# Basic application configuration
image:
  repository: myapp
  tag: "1.0.0"

service:
  type: ClusterIP
  ports:
    http: 8080

extraDeploy:
  # ============================================================================
  # Example 1: Nginx Configuration ConfigMap (block scalar — uses templates)
  # ============================================================================
  # Deploy a custom nginx configuration file
  - |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: {{ include "generic-app.fullname" . }}-nginx-config
      namespace: {{ include "generic-app.namespace" . }}
      labels: {{- include "generic-app.labels" . | nindent 4 }}
      annotations:
        description: "Custom nginx configuration for {{ .Release.Name }}"
    data:
      nginx.conf: |
        user nginx;
        worker_processes auto;
        error_log /var/log/nginx/error.log warn;
        pid /var/run/nginx.pid;

        events {
          worker_connections 1024;
        }

        http {
          include /etc/nginx/mime.types;
          default_type application/octet-stream;

          log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';

          access_log /var/log/nginx/access.log main;

          sendfile on;
          tcp_nopush on;
          keepalive_timeout 65;
          gzip on;

          server {
            listen 80;
            server_name {{ .Values.ingress.hostname | default "localhost" }};

            location / {
              proxy_pass http://{{ include "generic-app.fullname" . }}:{{ .Values.service.ports.http }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /health {
              access_log off;
              return 200 "healthy\n";
            }
          }
        }

  # ============================================================================
  # Example 2: Database Migration Job (block scalar — uses templates + conditionals)
  # ============================================================================
  # Runs database migrations before the application starts
  - |
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: {{ include "generic-app.fullname" . }}-db-migration
      namespace: {{ include "generic-app.namespace" . }}
      labels: {{- include "generic-app.labels" . | nindent 4 }}
        app.kubernetes.io/component: migration
      annotations:
        "helm.sh/hook": pre-install,pre-upgrade
        "helm.sh/hook-weight": "-5"
        "helm.sh/hook-delete-policy": before-hook-creation
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 300
      template:
        metadata:
          name: {{ include "generic-app.fullname" . }}-db-migration
          labels: {{- include "generic-app.selectorLabels" . | nindent 8 }}
            app.kubernetes.io/component: migration
        spec:
          restartPolicy: OnFailure
          {{- if .Values.serviceAccount.create }}
          serviceAccountName: {{ include "generic-app.serviceAccountName" . }}
          {{- end }}
          containers:
          - name: migration
            image: {{ include "generic-app.image" . }}
            command: ["npm", "run", "migrate:up"]
            env:
            - name: DATABASE_URL
              value: "postgresql://postgres:5432/mydb"
            - name: NODE_ENV
              value: "production"
            {{- if .Values.extraEnvVars }}
            {{- include "generic-app.tplvalues.render" (dict "value" .Values.extraEnvVars "context" $) | nindent 8 }}
            {{- end }}
            resources:
              limits:
                cpu: 500m
                memory: 512Mi
              requests:
                cpu: 100m
                memory: 128Mi

  # ============================================================================
  # Example 3: Backup CronJob (block scalar — uses templates)
  # ============================================================================
  # Scheduled daily backup job
  - |
    apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: {{ include "generic-app.fullname" . }}-backup
      namespace: {{ include "generic-app.namespace" . }}
      labels: {{- include "generic-app.labels" . | nindent 4 }}
        app.kubernetes.io/component: backup
    spec:
      schedule: "0 2 * * *"
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 1
      concurrencyPolicy: Forbid
      jobTemplate:
        spec:
          template:
            metadata:
              labels: {{- include "generic-app.selectorLabels" . | nindent 12 }}
                app.kubernetes.io/component: backup
            spec:
              restartPolicy: OnFailure
              containers:
              - name: backup
                image: postgres:15-alpine
                command:
                - /bin/sh
                - -c
                - |
                  BACKUP_FILE="/backups/backup-$(date +%Y%m%d-%H%M%S).sql"
                  echo "Starting backup to $BACKUP_FILE"
                  pg_dump -h postgres-service -U postgres -d mydb > "$BACKUP_FILE"
                  gzip "$BACKUP_FILE"
                  echo "Backup completed: $BACKUP_FILE.gz"

                  find /backups -name "backup-*.sql.gz" -mtime +7 -delete
                  echo "Old backups cleaned up"
                env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: password
                volumeMounts:
                - name: backup-storage
                  mountPath: /backups
                resources:
                  limits:
                    cpu: 500m
                    memory: 512Mi
                  requests:
                    cpu: 100m
                    memory: 128Mi
              volumes:
              - name: backup-storage
                persistentVolumeClaim:
                  claimName: backup-pvc

  # ============================================================================
  # Example 4: Prometheus ServiceMonitor (block scalar — uses templates)
  # ============================================================================
  # For monitoring with Prometheus Operator
  - |
    apiVersion: monitoring.coreos.com/v1
    kind: ServiceMonitor
    metadata:
      name: {{ include "generic-app.fullname" . }}
      namespace: {{ include "generic-app.namespace" . }}
      labels: {{- include "generic-app.labels" . | nindent 4 }}
        prometheus: kube-prometheus
    spec:
      selector:
        matchLabels: {{- include "generic-app.selectorLabels" . | nindent 6 }}
      endpoints:
      - port: http
        path: /metrics
        interval: 30s
        scrapeTimeout: 10s
        honorLabels: true
        relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace

  # ============================================================================
  # Example 5: Application Secret (block scalar — uses templates)
  # ============================================================================
  # Create a secret with values from chart configuration
  - |
    apiVersion: v1
    kind: Secret
    metadata:
      name: {{ include "generic-app.fullname" . }}-app-secret
      namespace: {{ include "generic-app.namespace" . }}
      labels: {{- include "generic-app.labels" . | nindent 4 }}
    type: Opaque
    stringData:
      app-name: {{ include "generic-app.fullname" . }}
      app-version: {{ .Chart.AppVersion }}
      release-name: {{ .Release.Name }}
      api-key: {{ .Values.apiKey | default "default-api-key" }}
      database-url: postgresql://{{ .Values.database.host | default "localhost" }}:5432/{{ .Values.database.name | default "mydb" }}

  # ============================================================================
  # Example 6: Init Database Job (block scalar — uses templates + conditionals)
  # ============================================================================
  # Creates initial database schema (runs only on install)
  - |
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: {{ include "generic-app.fullname" . }}-init-db
      namespace: {{ include "generic-app.namespace" . }}
      labels: {{- include "generic-app.labels" . | nindent 4 }}
        app.kubernetes.io/component: init
      annotations:
        "helm.sh/hook": post-install
        "helm.sh/hook-weight": "-3"
        "helm.sh/hook-delete-policy": hook-succeeded
    spec:
      backoffLimit: 5
      template:
        metadata:
          name: {{ include "generic-app.fullname" . }}-init-db
          labels: {{- include "generic-app.selectorLabels" . | nindent 8 }}
            app.kubernetes.io/component: init
        spec:
          restartPolicy: OnFailure
          containers:
          - name: init-db
            image: postgres:15-alpine
            command:
            - /bin/sh
            - -c
            - |
              echo "Creating initial database schema..."
              psql -h postgres-service -U postgres -d mydb <<EOF
              CREATE TABLE IF NOT EXISTS users (
                id SERIAL PRIMARY KEY,
                username VARCHAR(50) UNIQUE NOT NULL,
                email VARCHAR(100) UNIQUE NOT NULL,
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );

              CREATE TABLE IF NOT EXISTS sessions (
                id SERIAL PRIMARY KEY,
                user_id INTEGER REFERENCES users(id),
                token VARCHAR(255) NOT NULL,
                expires_at TIMESTAMP NOT NULL,
                created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
              );

              CREATE INDEX IF NOT EXISTS idx_sessions_token ON sessions(token);
              CREATE INDEX IF NOT EXISTS idx_sessions_user_id ON sessions(user_id);

              INSERT INTO users (username, email)
              VALUES ('admin', 'admin@example.com')
              ON CONFLICT (username) DO NOTHING;

              echo "Database initialization completed successfully!"
              EOF
            env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: password
            resources:
              limits:
                cpu: 200m
                memory: 256Mi
              requests:
                cpu: 50m
                memory: 64Mi

  # ============================================================================
  # Example 7: PersistentVolumeClaim (block scalar — uses templates + conditionals)
  # ============================================================================
  - |
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: backup-pvc
      namespace: {{ include "generic-app.namespace" . }}
      labels: {{- include "generic-app.labels" . | nindent 4 }}
        app.kubernetes.io/component: storage
    spec:
      accessModes:
        - ReadWriteOnce
      {{- if .Values.global.storageClass }}
      storageClassName: {{ .Values.global.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: 10Gi

  # ============================================================================
  # Example 8: PodMonitor (block scalar — uses templates)
  # ============================================================================
  # Alternative to ServiceMonitor, scrapes pods directly
  - |
    apiVersion: monitoring.coreos.com/v1
    kind: PodMonitor
    metadata:
      name: {{ include "generic-app.fullname" . }}-pods
      namespace: {{ include "generic-app.namespace" . }}
      labels: {{- include "generic-app.labels" . | nindent 4 }}
    spec:
      selector:
        matchLabels: {{- include "generic-app.selectorLabels" . | nindent 6 }}
      podMetricsEndpoints:
      - port: http
        path: /actuator/prometheus
        interval: 15s

  # ============================================================================
  # Example 9: NetworkPolicy (block scalar — uses templates)
  # ============================================================================
  # Allow backup job to access database
  - |
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: {{ include "generic-app.fullname" . }}-backup-netpol
      namespace: {{ include "generic-app.namespace" . }}
      labels: {{- include "generic-app.labels" . | nindent 4 }}
    spec:
      podSelector:
        matchLabels:
          {{- include "generic-app.selectorLabels" . | nindent 6 }}
          app.kubernetes.io/component: backup
      policyTypes:
      - Egress
      egress:
      - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
        ports:
        - protocol: UDP
          port: 53
      - to:
        - podSelector:
            matchLabels:
              app: postgres
        ports:
        - protocol: TCP
          port: 5432

  # ============================================================================
  # Example 10: Sealed Secret (block scalar — uses templates)
  # ============================================================================
  # Encrypted secret that can be safely stored in Git
  - |
    apiVersion: bitnami.com/v1alpha1
    kind: SealedSecret
    metadata:
      name: {{ include "generic-app.fullname" . }}-sealed-secret
      namespace: {{ include "generic-app.namespace" . }}
      labels: {{- include "generic-app.labels" . | nindent 4 }}
    spec:
      encryptedData:
        database-password: AgBqxT5...
      template:
        metadata:
          name: {{ include "generic-app.fullname" . }}-sealed-secret
          namespace: {{ include "generic-app.namespace" . }}
          labels: {{- include "generic-app.labels" . | nindent 8 }}

  # ============================================================================
  # Example 11: Plain YAML map (NO template functions needed)
  # ============================================================================
  # When you don't need template functions, a plain YAML map works fine.
  # The item goes through toYaml → tpl, but since there are no {{ }} expressions,
  # tpl simply passes the content through unchanged.
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: static-data-pvc
      namespace: my-namespace
      labels:
        app: my-app
        component: storage
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi

  # ============================================================================
  # Example 12: Plain YAML map with quoted templates for string fields
  # ============================================================================
  # You can use quoted template expressions for scalar (string) fields like
  # name, namespace, image, etc. This works because toYaml preserves them as
  # strings, and tpl evaluates to a string — which is still valid for the field.
  # Do NOT use this for mapping fields (labels, selector, matchLabels).
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: '{{ include "generic-app.fullname" . }}-cache-pvc'
      namespace: '{{ .Values.namespaceOverride | default "default" }}'
      labels:
        app: cache-service
        component: storage
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 8Gi
