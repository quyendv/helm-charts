# Example: pull secrets from an external provider via the External Secrets Operator.
# Requires the External Secrets Operator and a SecretStore/ClusterSecretStore in the cluster.

image:
  registry: docker.io
  repository: nginx
  tag: "1.25.3"

externalSecret:
  enabled: true
  # apiVersion: external-secrets.io/v1beta1   # uncomment for older operator releases
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    # name: ""                # defaults to the release fullname
    creationPolicy: Owner
    deletionPolicy: Retain
  # Explicit key-by-key mapping
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: prod/myapp/db
        property: password
  # ...and/or bulk import everything under a path
  dataFrom:
    - extract:
        key: prod/myapp/config

# Load the operator-created Secret into the container as environment variables
extraEnvVarsSecrets:
  - '{{ include "generic-app.fullname" . }}'
