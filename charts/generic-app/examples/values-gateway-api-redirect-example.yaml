# Gateway API with explicit HTTP -> HTTPS redirect route.
# This is similar in intent to ingress force-ssl-redirect, but modeled as
# a separate HTTPRoute with RequestRedirect.

image:
  repository: nginx
  tag: "1.25.3"

service:
  enabled: true
  type: ClusterIP
  ports:
    http: 80

ingress:
  enabled: false

gatewayApi:
  enabled: true
  hostname: myapp.example.com
  httpRoute:
    # Main application route on HTTPS listener.
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: external-http
        namespace: gateway-system
        sectionName: https
  httpRedirect:
    enabled: true
    # Redirect route attached to HTTP listener.
    parentRefs:
      - group: gateway.networking.k8s.io
        kind: Gateway
        name: external-http
        namespace: gateway-system
        sectionName: http
    statusCode: 301
    scheme: https
  certificate:
    enabled: false
