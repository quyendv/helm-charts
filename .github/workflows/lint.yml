name: Lint Charts

on:
  # Run on every PR so required status checks always report (a path-filtered
  # trigger would leave PRs that don't touch charts/** stuck "pending").
  pull_request:
  push:
    branches:
      - main
      - develop
    paths:
      - 'charts/**'

jobs:
  docs:
    name: README in sync with values.yaml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check docs are up to date
        run: make docs-check

  lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint charts
        run: make lint
