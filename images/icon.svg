<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGradient)"/>
  
  <!-- Container/Box representation -->
  <g transform="translate(128, 128)">
    <!-- Back panel of box -->
    <path d="M -45 -35 L 45 -35 L 60 -20 L 60 50 L -30 50 L -45 35 Z" 
          fill="url(#boxGradient)" opacity="0.8"/>
    
    <!-- Front panel of box -->
    <path d="M -50 -30 L 40 -30 L 40 40 L -50 40 Z" 
          fill="url(#boxGradient)" stroke="#fff" stroke-width="2"/>
    
    <!-- Top panel of box (lid) -->
    <path d="M -50 -30 L -35 -45 L 55 -45 L 40 -30 Z" 
          fill="#93C5FD" stroke="#fff" stroke-width="2"/>
    
    <!-- Right panel of box -->
    <path d="M 40 -30 L 55 -45 L 55 25 L 40 40 Z" 
          fill="#60A5FA" stroke="#fff" stroke-width="2"/>
    
    <!-- Generic app icon - stylized 'G' -->
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="60" 
          font-weight="bold" fill="#fff" text-anchor="middle">G</text>
    
    <!-- Decorative dots -->
    <circle cx="-35" cy="-55" r="4" fill="#FCD34D"/>
    <circle cx="45" cy="-55" r="4" fill="#FCD34D"/>
    <circle cx="0" cy="60" r="4" fill="#FCD34D"/>
  </g>
  
  <!-- Helm-style decoration -->
  <path d="M 128 220 Q 100 230, 85 220 Q 85 210, 100 205 Q 128 200, 156 205 Q 171 210, 171 220 Q 156 230, 128 220" 
        fill="#FCD34D" opacity="0.6"/>
</svg>

